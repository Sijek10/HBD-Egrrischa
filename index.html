<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Egrrischa ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            padding: 24px;
            box-sizing: border-box;
        }
        .floating-heart, .floating-star {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.85;
        }
        .floating-heart { font-size: 1.5em; animation: floatUp linear forwards; }
        .floating-star { font-size: 1.2em; animation: floatUpTwinkle linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
        }
        @keyframes floatUpTwinkle {
            0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
            50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
            100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 480px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s ease forwards, glowPulse 3s ease-in-out infinite 1.2s;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 20px rgba(255,105,135,0.3); }
            50% { box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 0 45px rgba(255,105,135,0.7); }
        }
        .container h2 { margin: 0; font-size: 1.3em; color: #c2185b; }
        .container h1 {
            font-size: 2.2em;
            margin: 10px 0 20px;
            background: linear-gradient(90deg, #c2185b, #ff6b9d, #c2185b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
            cursor: pointer;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .container p { color: #4a4a4a; font-size: 1.1em; margin-bottom: 24px; }
        #startBtn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            background: #c2185b;
            color: white;
            font-size: 1.05em;
            cursor: pointer;
            font-family: inherit;
            animation: pulseBtn 1.8s infinite ease-in-out;
        }
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        #startBtn:disabled { animation: none; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div class="container">
        <h2>🎂 Happy Birthday 🎂</h2>
        <h1 id="eggTitle">Egrrischa ❤️</h1>
        <p id="introText"></p>
        <button id="startBtn">Buka Kejutan 🎁</button>
    </div>

    <script src="js/typing.js"></script>
    <script src="js/fireworks.js"></script>
    <script src="js/envelope.js"></script>
    <script src="js/music.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            typingEffect(
                document.getElementById("introText"),
                "Ada sesuatu yang spesial untukmu...",
                60
            );

            function spawnFloatingHeart(){
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
                heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 9000);
            }
            setInterval(spawnFloatingHeart, 700);

            function spawnFloatingStar(){
                const star = document.createElement('div');
                star.className = 'floating-star';
                star.textContent = '✨';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDuration = (Math.random() * 4 + 6) + 's';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 10000);
            }
            setInterval(spawnFloatingStar, 800);

            let eggTap0 = 0;
            document.getElementById("eggTitle").addEventListener("click", function(){
                eggTap0++;
                if(eggTap0 === 5){
                    alert("Rahasia kecil 🎉\n\nSebenernya dari awal liat kamu, aku udah tau kamu yang akan jadi tujuan akhirku.");
                    eggTap0 = 0;
                }
            });
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
