<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Alasan Aku Sayang Kamu ❤️</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
      text-align: center; padding: 30px 16px; box-sizing: border-box;
      position: relative; overflow-x: hidden;
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    h1 { color: #c2185b; margin-bottom: 10px; cursor: pointer; position: relative; z-index: 2; }
    #progress {
      color: #c2185b; font-weight: 600; margin-bottom: 20px;
      position: relative; z-index: 2; font-size: 0.95em;
    }
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; max-width: 420px; margin: 0 auto 30px;
      position: relative; z-index: 2;
    }
    .card { aspect-ratio: 1; perspective: 600px; cursor: pointer; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.6s; transform-style: preserve-3d;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 10px; box-sizing: border-box;
    }
    .card-front {
      background: linear-gradient(135deg, #c2185b, #ff6b9d);
      color: white;
      font-size: 1.9em;
      box-shadow: 0 6px 16px rgba(194, 24, 91, 0.4);
      animation: cardPulse 2s infinite ease-in-out;
    }
    @keyframes cardPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .card-back {
      background: linear-gradient(135deg, #fff5f7, #ffe4ec);
      color: #b0335f;
      font-family: 'Georgia', serif;
      font-size: 0.85em;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.2px;
      transform: rotateY(180deg);
      box-shadow: 0 6px 16px rgba(194, 24, 91, 0.25), inset 0 0 0 2px rgba(194, 24, 91, 0.15);
      text-shadow: 0 1px 1px rgba(255,255,255,0.5);
    }
    .card-back.special {
      background: linear-gradient(135deg, #c2185b, #ff6b9d);
      color: white;
      text-shadow: none;
    }
    #bonusMsg {
      color: #c2185b; font-weight: 700; margin-bottom: 16px;
      min-height: 24px; position: relative; z-index: 2;
    }
    .next-btn {
      padding: 12px 26px; border: none; border-radius: 25px;
      background: #c2185b; color: white; font-size: 1em;
      cursor: pointer; font-family: inherit;
      position: relative; z-index: 2;
    }
    .nav-row { display: flex; gap: 10px; justify-content: center; position: relative; z-index: 2; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <h1 id="eggTitle">Tap Tiap Kartu untuk Lihat Alasannya ❤️</h1>
  <div id="progress">0 dari 7 kartu terbuka 💕</div>
  <div class="grid" id="grid"></div>
  <div id="bonusMsg"></div>
  <div class="nav-row">
    <button class="next-btn" id="backBtn" style="background:#888;">⬅️ Back</button>
    <button class="next-btn" id="nextBtn">Next ➡️</button>
  </div>

  <script>
    const reasonsData = [
      { icon: "🌸", text: "Karena senyummu selalu bikin hariku lebih baik." },
      { icon: "💕", text: "Karena kamu sabar mendengarkan semua ceritaku." },
      { icon: "✨", text: "Karena kamu selalu ada saat aku butuh kamu." },
      { icon: "🎀", text: "Karena kamu apa adanya, dan itu yang aku suka." },
      { icon: "💌", text: "Karena bersamamu, semua terasa lebih ringan." },
      { icon: "😊", text: "Karena kamu adalah rumah yang aku tuju." },
      { icon: "🎁", text: "Mau nggak jadi bagian dari semua alasan ini selamanya?", special: true }
    ];

    // Shuffle posisi kartu setiap halaman dibuka
    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const shuffledReasons = shuffle(reasonsData);
    const grid = document.getElementById('grid');
    const progressEl = document.getElementById('progress');
    const bonusMsg = document.getElementById('bonusMsg');
    let openedCount = 0;
    const totalCards = shuffledReasons.length;

    // Efek suara klik sederhana, tanpa file audio (Web Audio API)
    function playClickSound(){
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    shuffledReasons.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">${item.icon}</div>
          <div class="card-back ${item.special ? 'special' : ''}">${item.text}</div>
        </div>
      `;
      let alreadyOpened = false;
      card.addEventListener('click', function(){
        if(!alreadyOpened){
          alreadyOpened = true;
          openedCount++;
          progressEl.textContent = `${openedCount} dari ${totalCards} kartu terbuka 💕`;
          playClickSound();

          if(openedCount === totalCards){
            bonusMsg.textContent = "Yeay, semua alasan udah kebuka! 🎉";
            triggerBigConfetti();
          }
        }
        card.classList.toggle('flipped');
      });
      grid.appendChild(card);
    });

    document.getElementById('nextBtn').addEventListener('click', function(){
      window.location.href = "question.html";
    });

    document.getElementById('backBtn').addEventListener('click', function(){
      window.location.href = "gallery.html";
    });

    let eggTap5 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap5++;
      if(eggTap5 === 5){
        alert("Rahasia kecil 🎉\n\nSebenernya alasan aku sayang kamu nggak cukup ditulis di kartu-kartu itu — ada ratusan alasan lain yang nggak muat aku tulis semua.");
        eggTap5 = 0;
      }
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
    let confettiPieces = [];
    let extraBurst = false;

    function spawnConfetti(){
      const count = extraBurst ? 6 : 2;
      for(let i = 0; i < count; i++){
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -10,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }

    function triggerBigConfetti(){
      extraBurst = true;
      setTimeout(() => { extraBurst = false; }, 2500);
    }

    function drawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
      });
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
      requestAnimationFrame(drawConfetti);
    }
    setInterval(spawnConfetti, 100);
    drawConfetti();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function spawnFloatingHeart(){
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }
    setInterval(spawnFloatingHeart, 600);

    function spawnFloatingStar(){
      const star = document.createElement('div');
      star.className = 'floating-star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      star.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 10000);
    }
    setInterval(spawnFloatingStar, 700);
  </script>
</body>
</html>
