<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Alasan Aku Sayang Kamu ❤️</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
      text-align: center; padding: 30px 16px; box-sizing: border-box;
      position: relative; overflow-x: hidden;
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    h1 { color: #c2185b; margin-bottom: 24px; cursor: pointer; position: relative; z-index: 2; }
    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; max-width: 420px; margin: 0 auto 30px;
      position: relative; z-index: 2;
    }
    .card { aspect-ratio: 1; perspective: 600px; cursor: pointer; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.6s; transform-style: preserve-3d;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      padding: 8px; box-sizing: border-box;
    }
    .card-front { background: #c2185b; color: white; font-size: 1.8em; }
    .card-back {
      background: white; color: #4a4a4a; font-size: 0.78em;
      transform: rotateY(180deg); box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .next-btn {
      padding: 12px 26px; border: none; border-radius: 25px;
      background: #c2185b; color: white; font-size: 1em;
      cursor: pointer; font-family: inherit;
      position: relative; z-index: 2;
    }
    .nav-row { display: flex; gap: 10px; justify-content: center; position: relative; z-index: 2; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <h1 id="eggTitle">Tap Tiap Kartu untuk Lihat Alasannya ❤️</h1>
  <div class="grid" id="grid"></div>
  <div class="nav-row">
    <button class="next-btn" id="backBtn" style="background:#888;">⬅️ Back</button>
    <button class="next-btn" id="nextBtn">Next ➡️</button>
  </div>

  <script>
    const reasons = [
      "Karena senyummu selalu bikin hariku lebih baik.",
      "Karena kamu sabar mendengarkan semua ceritaku.",
      "Karena kamu selalu ada saat aku butuh kamu.",
      "Karena kamu apa adanya, dan itu yang aku suka.",
      "Karena bersamamu, semua terasa lebih ringan.",
      "Karena kamu adalah rumah yang aku tuju."
    ];

    const grid = document.getElementById('grid');
    reasons.forEach((text) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">❤️</div>
          <div class="card-back">${text}</div>
        </div>
      `;
      card.addEventListener('click', function(){
        card.classList.toggle('flipped');
      });
      grid.appendChild(card);
    });

    document.getElementById('nextBtn').addEventListener('click', function(){
      window.location.href = "question.html";
    });

    document.getElementById('backBtn').addEventListener('click', function(){
      window.location.href = "gallery.html";
    });

    let eggTap5 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap5++;
      if(eggTap5 === 5){
        alert("Rahasia kecil 🎉\n\nSebenernya alasan aku sayang kamu nggak cukup ditulis di 6 kartu itu — ada ratusan alasan lain yang nggak muat aku tulis semua.");
        eggTap5 = 0;
      }
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
    let confettiPieces = [];

    function spawnConfetti(){
      for(let i = 0; i < 2; i++){
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -10,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }
    function drawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
      });
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
      requestAnimationFrame(drawConfetti);
    }
    setInterval(spawnConfetti, 100);
    drawConfetti();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function spawnFloatingHeart(){
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }
    setInterval(spawnFloatingHeart, 600);

    function spawnFloatingStar(){
      const star = document.createElement('div');
      star.className = 'floating-star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      star.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 10000);
    }
    setInterval(spawnFloatingStar, 700);
  </script>
</body>
</html>
