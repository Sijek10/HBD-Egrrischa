<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Galeri Kenangan ❤️</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
      text-align: center; padding: 30px 16px 60px; box-sizing: border-box;
      position: relative; overflow-x: hidden;
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    h1 { color: #c2185b; margin-bottom: 30px; cursor: pointer; position: relative; z-index: 2; }
    .polaroid {
      background: white; padding: 14px 14px 30px; max-width: 280px;
      margin: 0 auto 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-radius: 4px; opacity: 0;
      transform: translateY(40px) rotate(0deg);
      transition: opacity 0.8s ease, transform 0.8s ease;
      position: relative; z-index: 2;
    }
    .polaroid:nth-child(odd) { transform: translateY(40px) rotate(-4deg); }
    .polaroid:nth-child(even) { transform: translateY(40px) rotate(4deg); }
    .polaroid.visible { opacity: 1; transform: translateY(0) rotate(-2deg); }
    .polaroid:nth-child(even).visible { transform: translateY(0) rotate(2deg); }
    .polaroid img { width: 100%; display: block; border-radius: 2px; }
    .caption { margin-top: 14px; font-family: 'Georgia', serif; color: #555; font-size: 0.95em; }
    .next-btn {
      margin-top: 10px; padding: 12px 26px; border: none; border-radius: 25px;
      background: #c2185b; color: white; font-size: 1em;
      cursor: pointer; font-family: inherit;
      position: relative; z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <h1 id="eggTitle">Galeri Kenangan Kita ❤️</h1>

  <div class="polaroid">
    <img src="../assets/foto1.jpg" alt="Foto 1">
    <div class="caption">Tulis caption foto pertama di sini</div>
  </div>

  <div class="polaroid">
    <img src="../assets/foto2.jpg" alt="Foto 2">
    <div class="caption">Tulis caption foto kedua di sini</div>
  </div>

  <div class="polaroid">
    <img src="../assets/foto3.jpg" alt="Foto 3">
    <div class="caption">Tulis caption foto ketiga di sini</div>
  </div>

  <button class="next-btn" id="nextBtn">Lanjut ➡️</button>

  <script>
    const polaroids = document.querySelectorAll('.polaroid');

    function checkVisible(){
      polaroids.forEach(p => {
        const rect = p.getBoundingClientRect();
        if(rect.top < window.innerHeight * 0.85){
          p.classList.add('visible');
        }
      });
    }
    window.addEventListener('scroll', checkVisible);
    window.addEventListener('load', checkVisible);

    document.getElementById('nextBtn').addEventListener('click', function(){
      window.location.href = "reasons.html";
    });

    let eggTap4 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap4++;
      if(eggTap4 === 5){
        alert("Rahasia kecil 🎉\n\nSetiap foto di galeri ini nyimpen cerita yang aku selalu suka inget. Makasih udah jadi bagian dari kenangan terbaikku.");
        eggTap4 = 0;
      }
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
    let confettiPieces = [];

    function spawnConfetti(){
      for(let i = 0; i < 2; i++){
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -10,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }
    function drawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
      });
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
      requestAnimationFrame(drawConfetti);
    }
    setInterval(spawnConfetti, 100);
    drawConfetti();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function spawnFloatingHeart(){
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }
    setInterval(spawnFloatingHeart, 600);

    function spawnFloatingStar(){
      const star = document.createElement('div');
      star.className = 'floating-star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      star.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 10000);
    }
    setInterval(spawnFloatingStar, 700);
  </script>
</body>
</html>
