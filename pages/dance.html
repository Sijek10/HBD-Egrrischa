<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Joget Bareng! 🐱</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
      background-size: 400% 400%;
      animation: bgShift 6s ease infinite;
      font-family: 'Poppins', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; text-align: center;
      padding: 20px; box-sizing: border-box;
      position: relative;
    }
    @keyframes bgShift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    h1 {
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      margin-bottom: 30px;
      cursor: pointer;
      position: relative; z-index: 2;
    }
    .stage {
      position: relative; width: 280px; height: 280px;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .cat {
      font-size: 6em; display: inline-block;
      animation: bigDance 0.6s infinite ease-in-out;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.25));
    }
    @keyframes bigDance {
      0%   { transform: translateY(0) rotate(-15deg) scale(1); }
      20%  { transform: translateY(-25px) rotate(15deg) scale(1.05); }
      40%  { transform: translateY(0) rotate(-15deg) scale(1); }
      60%  { transform: translateY(-25px) rotate(15deg) scale(1.05); }
      80%  { transform: translateY(0) rotate(-10deg) scale(1); }
      100% { transform: translateY(0) rotate(-15deg) scale(1); }
    }
    .note {
      position: absolute; font-size: 1.8em;
      animation: noteFly 1.6s infinite ease-in-out;
      opacity: 0;
    }
    .note:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
    .note:nth-child(2) { top: 20%; right: 5%; animation-delay: 0.4s; }
    .note:nth-child(3) { bottom: 15%; left: 10%; animation-delay: 0.8s; }
    .note:nth-child(4) { bottom: 10%; right: 10%; animation-delay: 1.2s; }
    @keyframes noteFly {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-60px) scale(0.5); opacity: 0; }
    }
    .music-btn {
      margin-top: 20px; padding: 12px 26px; border: none; border-radius: 25px;
      background: #c2185b; color: white; font-size: 1em;
      cursor: pointer; font-family: inherit;
      position: relative; z-index: 2;
    }
    .nav-row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; position: relative; z-index: 2; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <h1 id="eggTitle">Joget Bareng Yuk! 🎉</h1>

  <div class="stage">
    <span class="note">🎵</span>
    <span class="note">🎶</span>
    <span class="note">🎵</span>
    <span class="note">🎶</span>
    <span class="cat">🐱</span>
  </div>

  <button class="music-btn" id="musicBtn">▶️ Putar Musik</button>
  <div class="nav-row">
    <button class="music-btn" id="backBtn" style="background:#888;">⬅️ Back</button>
    <button class="music-btn" id="nextBtn" style="background:#888;">Next ➡️</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="../assets/music2.mp3" type="audio/mpeg">
  </audio>

  <script src="../js/music.js"></script>
  <script>
    let isPlaying = false;
    document.getElementById("musicBtn").addEventListener("click", function(){
      const btn = this;
      if(isPlaying){
        document.getElementById("bgMusic").pause();
        btn.textContent = "▶️ Putar Musik";
      } else {
        playMusic();
        btn.textContent = "⏸️ Pause Musik";
      }
      isPlaying = !isPlaying;
    });

    document.getElementById("nextBtn").addEventListener("click", function(){
      window.location.href = "question.html";
    });

    document.getElementById("backBtn").addEventListener("click", function(){
      window.location.href = "letter.html";
    });

    let eggTap2 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap2++;
      if(eggTap2 === 5){
        alert("Rahasia kecil 🎉\n\nSi kucing ini sebenernya mewakili aku, lagi joget saking senangnya ulang tahunmu tiba. Makasih udah bikin hari-hariku selucu dan seceria ini.");
        eggTap2 = 0;
      }
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
    let confettiPieces = [];

    function spawnConfetti(){
      for(let i = 0; i < 2; i++){
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -10,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }
    function drawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
      });
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
      requestAnimationFrame(drawConfetti);
    }
    setInterval(spawnConfetti, 100);
    drawConfetti();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function spawnFloatingHeart(){
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }
    setInterval(spawnFloatingHeart, 600);

    function spawnFloatingStar(){
      const star = document.createElement('div');
      star.className = 'floating-star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      star.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 10000);
    }
    setInterval(spawnFloatingStar, 700);
  </script>
</body>
</html>
