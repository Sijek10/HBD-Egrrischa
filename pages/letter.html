<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Egrrischa ❤️</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 24px; box-sizing: border-box;
      overflow: hidden; position: relative;
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star, .floating-butterfly {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    .floating-butterfly { font-size: 1.6em; animation-name: floatUpSway; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    @keyframes floatUpSway {
      0% { transform: translateY(0) translateX(0) rotate(-10deg); opacity: 0.9; }
      25% { transform: translateY(-27vh) translateX(30px) rotate(10deg); }
      50% { transform: translateY(-55vh) translateX(-30px) rotate(-10deg); }
      75% { transform: translateY(-82vh) translateX(30px) rotate(10deg); }
      100% { transform: translateY(-110vh) translateX(0) rotate(-10deg); opacity: 0; }
    }
    .letter-card {
      background: rgba(255, 255, 255, 0.93);
      border-radius: 20px; padding: 40px 32px; max-width: 500px;
      text-align: center; opacity: 0; transform: translateY(20px);
      animation: fadeInUp 1.2s ease forwards, glowPulse 3s ease-in-out infinite 1.2s;
      position: relative; z-index: 2;
    }
    .letter-card h1 {
      font-size: 1.6em; margin-bottom: 20px;
      background: linear-gradient(90deg, #c2185b, #ff6b9d, #c2185b);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: shine 3s linear infinite;
      cursor: pointer;
    }
    @keyframes shine { to { background-position: 200% center; } }
    #letterText { color: #4a4a4a; font-size: 1.1em; line-height: 1.8; min-height: 120px; }
    .heart {
      font-size: 2.2em; display: inline-block; margin-top: 10px;
      animation: heartbeat 1.2s infinite ease-in-out;
    }
    @keyframes heartbeat {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.3); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.3); }
      70%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .music-btn {
      margin-top: 18px; padding: 8px 16px; border: none; border-radius: 20px;
      background: #c2185b; color: white; font-size: 0.9em;
      cursor: pointer; font-family: inherit;
    }
    .nav-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 20px rgba(255,105,135,0.3); }
      50% { box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 0 45px rgba(255,105,135,0.7); }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="letter-card" id="letter">
    <h1 id="eggTitle">Surat untuk Calon Istriku, Egrrischa</h1>
    <p id="letterText"></p>
    <div class="heart">❤️</div>
    <br>
    <button class="music-btn" id="musicBtn">🎵 Putar Musik</button>
    <div class="nav-row">
      <button class="music-btn" id="backBtn" style="background:#888;">⬅️ Back</button>
      <button class="music-btn" id="nextBtn" style="background:#888;">Next ➡️</button>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="../assets/music1.mp3" type="audio/mpeg">
  </audio>

  <script src="../js/typing.js"></script>
  <script src="../js/envelope.js"></script>
  <script src="../js/music.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      openEnvelope();
      typingEffect(
        document.getElementById("letterText"),
        "Selamat ulang tahun, sayangku. Aku tidak sabar menanti hari aku bisa menyebutmu istriku. Terima kasih telah memilih berjalan bersamaku. Aku mencintaimu, hari ini dan selamanya.",
        40
      );

      let isPlaying = false;
      document.getElementById("musicBtn").addEventListener("click", function(){
        const btn = this;
        if(isPlaying){
          document.getElementById("bgMusic").pause();
          btn.textContent = "🎵 Putar Musik";
        } else {
          playMusic();
          btn.textContent = "⏸️ Pause Musik";
        }
        isPlaying = !isPlaying;
      });

      document.getElementById("bgMusic").addEventListener("ended", function(){
        window.location.href = "dance.html";
      });

      document.getElementById("nextBtn").addEventListener("click", function(){
        window.location.href = "dance.html";
      });

      document.getElementById("backBtn").addEventListener("click", function(){
        window.location.href = "../index.html";
      });

      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
      let confettiPieces = [];

      function spawnConfetti(){
        for(let i = 0; i < 2; i++){
          confettiPieces.push({
            x: Math.random() * canvas.width, y: -10,
            size: Math.random() * 8 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: Math.random() * 3 + 2,
            angle: Math.random() * 360,
            spin: Math.random() * 0.2 - 0.1
          });
        }
      }
      function drawConfetti(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiPieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
          p.y += p.speed;
          p.angle += p.spin;
        });
        confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
        requestAnimationFrame(drawConfetti);
      }
      setInterval(spawnConfetti, 80);
      drawConfetti();
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      function spawnFloatingHeart(){
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 9000);
      }
      setInterval(spawnFloatingHeart, 500);

      function spawnFloatingStar(){
        const star = document.createElement('div');
        star.className = 'floating-star';
        star.textContent = '✨';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
        star.style.animationDuration = (Math.random() * 4 + 6) + 's';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 10000);
      }
      setInterval(spawnFloatingStar, 600);

      function spawnButterfly(){
        const butterfly = document.createElement('div');
        butterfly.className = 'floating-butterfly';
        butterfly.textContent = '🦋';
        butterfly.style.left = Math.random() * 100 + 'vw';
        butterfly.style.animationDuration = (Math.random() * 3 + 7) + 's';
        document.body.appendChild(butterfly);
        setTimeout(() => butterfly.remove(), 11000);
      }
      setInterval(spawnButterfly, 1500);

      let eggTap1 = 0;
      document.getElementById("eggTitle").addEventListener("click", function(){
        eggTap1++;
        if(eggTap1 === 5){
          alert("Rahasia kecil 🎉\n\nKalau kamu nemu ini, berarti kamu memang teliti baca surat ini sampai habis. Itu salah satu alasan aku makin yakin sama kamu — kamu selalu perhatian sama hal-hal kecil. Aku serius pengen menikahimu, sayang.");
          eggTap1 = 0;
        }
      });
    });
  </script>
</body>
</html>
