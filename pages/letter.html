<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Egrrischa ❤️</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 24px;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }

    canvas#confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .floating-heart {
      position: fixed;
      bottom: -50px;
      font-size: 1.5em;
      pointer-events: none;
      z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }

    .letter-card {
      background: rgba(255, 255, 255, 0.93);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 500px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s ease forwards, glowPulse 3s ease-in-out infinite 1.2s;
      position: relative;
      z-index: 2;
    }

    .letter-card h1 {
      color: #c2185b;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    #letterText {
      color: #4a4a4a;
      font-size: 1.1em;
      line-height: 1.8;
      min-height: 120px;
    }

    .heart {
      font-size: 2em;
      display: inline-block;
      margin-top: 10px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .music-btn {
      margin-top: 18px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: #c2185b;
      color: white;
      font-size: 0.9em;
      cursor: pointer;
      font-family: inherit;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 20px rgba(255,105,135,0.3); }
      50% { box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 0 45px rgba(255,105,135,0.7); }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="letter-card" id="letter">
    <h1>Surat untuk Calon Istriku, Egrrischa</h1>
    <p id="letterText"></p>
    <div class="heart">❤️</div>
    <br>
    <button class="music-btn" id="musicBtn">🎵 Putar Musik</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="../assets/music.mp3" type="audio/mpeg">
  </audio>

  <script src="../js/typing.js"></script>
  <script src="../js/envelope.js"></script>
  <script src="../js/music.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      openEnvelope();
      typingEffect(
        document.getElementById("letterText"),
        "Selamat ulang tahun, sayangku. Aku tidak sabar menanti hari aku bisa menyebutmu istriku. Terima kasih telah memilih berjalan bersamaku. Aku mencintaimu, hari ini dan selamanya.",
        40
      );

      let isPlaying = false;
      document.getElementById("musicBtn").addEventListener("click", function(){
        const btn = this;
        if(isPlaying){
          document.getElementById("bgMusic").pause();
          btn.textContent = "🎵 Putar Musik";
        } else {
          playMusic();
          btn.textContent = "⏸️ Pause Musik";
        }
        isPlaying = !isPlaying;
      });

      // ===== Confetti terus-menerus =====
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066'];
      let confettiPieces = [];

      function spawnConfetti(){
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: -10,
          size: Math.random() * 7 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 2 + 1.5,
          angle: Math.random() * 360,
          spin: Math.random() * 0.15 - 0.075
        });
      }

      function drawConfetti(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiPieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
          p.y += p.speed;
          p.angle += p.spin;
        });
        confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
        requestAnimationFrame(drawConfetti);
      }

      setInterval(spawnConfetti, 150);
      drawConfetti();

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // ===== Hati melayang naik =====
      function spawnFloatingHeart(){
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 9000);
      }

      setInterval(spawnFloatingHeart, 800);
    });
  </script>
</body>
</html>
