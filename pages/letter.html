<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Egrrischa ❤️</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 24px;
      box-sizing: border-box;
    }

    .letter-card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s ease forwards;
    }

    .letter-card h1 {
      color: #c2185b;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    .letter-card p {
      color: #4a4a4a;
      font-size: 1.1em;
      line-height: 1.8;
    }

    .heart {
      font-size: 2em;
      animation: pulse 1.5s infinite ease-in-out;
      display: inline-block;
      margin-top: 10px;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="letter-card">
    <h1>Surat untuk Calon Istriku, Egrrischa</h1>
    <p>
      Selamat ulang tahun, sayangku. Aku tidak sabar menanti hari
      aku bisa menyebutmu istriku. Terima kasih telah memilih
      berjalan bersamaku. Aku mencintaimu, hari ini dan selamanya.
    </p>
    <div class="heart">❤️</div>
  </div>
</body>
</html>
