<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Egrrischa ❤️</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 24px;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }

    .letter-card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s ease forwards;
      position: relative;
      z-index: 2;
    }

    .letter-card h1 {
      color: #c2185b;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    .letter-card p {
      color: #4a4a4a;
      font-size: 1.1em;
      line-height: 1.8;
    }

    .heart {
      font-size: 2em;
      animation: pulse 1.5s infinite ease-in-out;
      display: inline-block;
      margin-top: 10px;
    }

    .music-btn {
      margin-top: 18px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: #c2185b;
      color: white;
      font-size: 0.9em;
      cursor: pointer;
      font-family: inherit;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    canvas#confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="letter-card">
    <h1>Surat untuk Calon Istriku, Egrrischa</h1>
    <p>
      Selamat ulang tahun, sayangku. Aku tidak sabar menanti hari
      aku bisa menyebutmu istriku. Terima kasih telah memilih
      berjalan bersamaku. Aku mencintaimu, hari ini dan selamanya.
    </p>
    <div class="heart">❤️</div>
    <br>
    <button class="music-btn" onclick="toggleMusic()">🎵 Putar Musik</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="../assets/music.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Tombol musik (browser butuh klik dulu sebelum audio bisa main otomatis)
    const music = document.getElementById('bgMusic');
    let isPlaying = false;
    function toggleMusic() {
      const btn = document.querySelector('.music-btn');
      if (isPlaying) {
        music.pause();
        btn.textContent = '🎵 Putar Musik';
      } else {
        music.play();
        btn.textContent = '⏸️ Pause Musik';
      }
      isPlaying = !isPlaying;
    }

    // Efek confetti sederhana
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d'];
    let confettiPieces = [];

    function createConfetti() {
      confettiPieces = [];
      for (let i = 0; i < 80; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();

        p.y += p.speed;
        p.angle += p.spin;

        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawConfetti);
    }

    createConfetti();
    drawConfetti();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
