<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Egrrischa ❤️</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 24px;
      box-sizing: border-box;
    }
    .letter-card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    .letter-card h1 {
      color: #c2185b;
      font-size: 1.6em;
      margin-bottom: 20px;
    }
    #letterText {
      color: #4a4a4a;
      font-size: 1.1em;
      line-height: 1.8;
      min-height: 120px;
    }
    .heart {
      font-size: 2em;
      display: inline-block;
      margin-top: 10px;
    }
    .music-btn {
      margin-top: 18px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: #c2185b;
      color: white;
      font-size: 0.9em;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="letter-card" id="letter">
    <h1>Surat untuk Calon Istriku, Egrrischa</h1>
    <p id="letterText"></p>
    <div class="heart">❤️</div>
    <br>
    <button class="music-btn" id="musicBtn">🎵 Putar Musik</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="../assets/music.mp3" type="audio/mpeg">
  </audio>

  <script src="../js/typing.js"></script>
  <script src="../js/envelope.js"></script>
  <script src="../js/music.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      openEnvelope();
      typingEffect(
        document.getElementById("letterText"),
        "Selamat ulang tahun, sayangku. Aku tidak sabar menanti hari aku bisa menyebutmu istriku. Terima kasih telah memilih berjalan bersamaku. Aku mencintaimu, hari ini dan selamanya.",
        40
      );

      let isPlaying = false;
      document.getElementById("musicBtn").addEventListener("click", function(){
        const btn = this;
        if(isPlaying){
          document.getElementById("bgMusic").pause();
          btn.textContent = "🎵 Putar Musik";
        } else {
          playMusic();
          btn.textContent = "⏸️ Pause Musik";
        }
        isPlaying = !isPlaying;
      });
    });
  </script>
</body>
</html>
