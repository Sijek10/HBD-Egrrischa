<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pertanyaan Penting ❤️</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      text-align: center; padding: 20px; box-sizing: border-box;
    }
    .box {
      background: rgba(255,255,255,0.92);
      border-radius: 20px; padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 420px; position: relative; z-index: 2;
    }
    h1 { color: #c2185b; margin-bottom: 30px; font-size: 1.5em; cursor: pointer; }
    .btn {
      padding: 12px 26px; border: none; border-radius: 25px;
      font-size: 1em; cursor: pointer; font-family: inherit; position: absolute;
    }
    .yes-btn { background: #c2185b; color: white; }
    .no-btn { background: #ccc; color: #333; }
    .btn-area { position: relative; height: 80px; margin-top: 10px; }
    #result {
      font-size: 1.3em; color: #c2185b; font-weight: bold;
      margin-top: 20px; min-height: 30px;
    }
    .big-heart {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 3em; z-index: 10; pointer-events: none;
    }
    .big-heart.grow { animation: growHeart 2.5s ease-in forwards; }
    @keyframes growHeart {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(25); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(35); opacity: 0; }
    }
    .final-message {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #ff6b9d, #c2185b);
      display: none; align-items: center; justify-content: center;
      color: white; font-size: 1.8em; font-weight: bold;
      text-align: center; z-index: 20; padding: 30px; box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="box" id="questionBox">
    <h1 id="eggTitle">Kamu sayang aku nggak? 🥺</h1>
    <div class="btn-area" id="btnArea">
      <button class="btn yes-btn" id="yesBtn" style="left: 20px; top: 20px;">Iya</button>
      <button class="btn no-btn" id="noBtn" style="right: 20px; top: 20px;">Tidak</button>
    </div>
    <div id="result"></div>
  </div>

  <div class="big-heart" id="bigHeart">❤️</div>
  <div class="final-message" id="finalMessage">
    Duh, aww~ makasih sayang ❤️<br>Aku sayang kamu lebih dari ini!
  </div>

  <script>
    const btnArea = document.getElementById('btnArea');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const result = document.getElementById('result');
    const bigHeart = document.getElementById('bigHeart');
    const finalMessage = document.getElementById('finalMessage');
    const questionBox = document.getElementById('questionBox');

    const teasingTexts = [
      "Yakin nih? 😏",
      "Coba dipikir lagi deh~",
      "Eh jangan gitu dong 🥺",
      "Beneran nih jawabannya? 😢",
      "Hmm... coba lagi yuk 😤",
      "Jangan bikin aku sedih dong 😭"
    ];
    let teaseIndex = 0;

    function moveButtonsRandomly(){
      const areaWidth = btnArea.offsetWidth;
      const areaHeight = btnArea.offsetHeight;
      const yesX = Math.random() * (areaWidth - 90);
      const yesY = Math.random() * (areaHeight - 45);
      const noX = Math.random() * (areaWidth - 90);
      const noY = Math.random() * (areaHeight - 45);
      yesBtn.style.left = yesX + 'px';
      yesBtn.style.top = yesY + 'px';
      yesBtn.style.right = 'auto';
      noBtn.style.left = noX + 'px';
      noBtn.style.top = noY + 'px';
      noBtn.style.right = 'auto';
    }

    noBtn.addEventListener('click', function(){
      result.textContent = teasingTexts[teaseIndex % teasingTexts.length];
      teaseIndex++;
      moveButtonsRandomly();
    });

    yesBtn.addEventListener('click', function(){
      questionBox.style.display = 'none';
      result.textContent = '';
      bigHeart.classList.add('grow');
      setTimeout(function(){
        finalMessage.style.display = 'flex';
      }, 900);
      setTimeout(function(){
        window.location.href = "gallery.html";
      }, 4000);
    });

    let eggTap3 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap3++;
      if(eggTap3 === 5){
        alert("Rahasia kecil 🎉\n\nJujur aja, nggak ada jawaban lain selain 'iya' yang aku terima. Kamu udah jadi bagian penting dalam hidupku, dan itu nggak akan berubah.");
        eggTap3 = 0;
      }
    });
  </script>
</body>
</html>
