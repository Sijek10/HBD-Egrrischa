<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pertanyaan Penting ❤️</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      text-align: center; padding: 20px; box-sizing: border-box;
    }
    canvas#confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .floating-heart, .floating-star {
      position: fixed; bottom: -50px;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }
    .floating-heart { font-size: 1.5em; }
    .floating-star { font-size: 1.2em; animation-name: floatUpTwinkle; }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUpTwinkle {
      0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
      50% { transform: translateY(-55vh) scale(1.3); opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
    }
    .box {
      background: rgba(255,255,255,0.92);
      border-radius: 20px; padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 420px; position: relative; z-index: 2;
    }
    h1 { color: #c2185b; margin-bottom: 30px; font-size: 1.5em; cursor: pointer; }
    .btn {
      padding: 12px 26px; border: none; border-radius: 25px;
      font-size: 1em; cursor: pointer; font-family: inherit; position: absolute;
    }
    .yes-btn { background: #c2185b; color: white; }
    .no-btn { background: #ccc; color: #333; }
    .btn-area { position: relative; height: 80px; margin-top: 10px; }
    #result {
      font-size: 1.3em; color: #c2185b; font-weight: bold;
      margin-top: 20px; min-height: 30px;
    }
    .big-heart {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 3em; z-index: 10; pointer-events: none;
    }
    .big-heart.grow { animation: growHeart 2.5s ease-in forwards; }
    @keyframes growHeart {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(25); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(35); opacity: 0; }
    }
    .final-message {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #ff6b9d, #c2185b);
      display: none; align-items: center; justify-content: center;
      color: white; font-size: 1.8em; font-weight: bold;
      text-align: center; z-index: 20; padding: 30px; box-sizing: border-box;
    }
    .nav-row {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      display: flex; gap: 10px; justify-content: center;
      z-index: 5;
    }
    .nav-btn {
      padding: 10px 22px; border: none; border-radius: 20px;
      background: #888; color: white; font-size: 0.9em;
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="box" id="questionBox">
    <h1 id="eggTitle">Kamu sayang aku nggak? 🥺</h1>
    <div class="btn-area" id="btnArea">
      <button class="btn yes-btn" id="yesBtn" style="left: 20px; top: 20px;">Iya</button>
      <button class="btn no-btn" id="noBtn" style="right: 20px; top: 20px;">Tidak</button>
    </div>
    <div id="result"></div>
  </div>

  <div class="big-heart" id="bigHeart">❤️</div>
  <div class="final-message" id="finalMessage">
    Duh, aww~ makasih sayang ❤️<br>Aku sayang kamu lebih dari ini!
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="backBtn">⬅️ Back</button>
    <button class="nav-btn" id="nextBtn">Next ➡️</button>
  </div>

  <script>
    const btnArea = document.getElementById('btnArea');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const result = document.getElementById('result');
    const bigHeart = document.getElementById('bigHeart');
    const finalMessage = document.getElementById('finalMessage');
    const questionBox = document.getElementById('questionBox');

    const teasingTexts = [
      "Yakin nih? 😏",
      "Coba dipikir lagi deh~",
      "Eh jangan gitu dong 🥺",
      "Beneran nih jawabannya? 😢",
      "Hmm... coba lagi yuk 😤",
      "Jangan bikin aku sedih dong 😭"
    ];
    let teaseIndex = 0;

    function moveButtonsRandomly(){
      const areaWidth = btnArea.offsetWidth;
      const areaHeight = btnArea.offsetHeight;
      const yesX = Math.random() * (areaWidth - 90);
      const yesY = Math.random() * (areaHeight - 45);
      const noX = Math.random() * (areaWidth - 90);
      const noY = Math.random() * (areaHeight - 45);
      yesBtn.style.left = yesX + 'px';
      yesBtn.style.top = yesY + 'px';
      yesBtn.style.right = 'auto';
      noBtn.style.left = noX + 'px';
      noBtn.style.top = noY + 'px';
      noBtn.style.right = 'auto';
    }

    noBtn.addEventListener('click', function(){
      result.textContent = teasingTexts[teaseIndex % teasingTexts.length];
      teaseIndex++;
      moveButtonsRandomly();
    });

    yesBtn.addEventListener('click', function(){
      questionBox.style.display = 'none';
      result.textContent = '';
      bigHeart.classList.add('grow');
      setTimeout(function(){
        finalMessage.style.display = 'flex';
      }, 900);
      setTimeout(function(){
        window.location.href = "closing.html";
      }, 4000);
    });

    document.getElementById('nextBtn').addEventListener('click', function(){
      window.location.href = "closing.html";
    });

    document.getElementById('backBtn').addEventListener('click', function(){
      window.location.href = "reasons.html";
    });

    let eggTap3 = 0;
    document.getElementById("eggTitle").addEventListener("click", function(){
      eggTap3++;
      if(eggTap3 === 5){
        alert("Rahasia kecil 🎉\n\nJujur aja, nggak ada jawaban lain selain 'iya' yang aku terima. Kamu udah jadi bagian penting dalam hidupku, dan itu nggak akan berubah.");
        eggTap3 = 0;
      }
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff6b81', '#ffb6c1', '#ff85a2', '#ffd1dc', '#ff4d6d', '#ffe066', '#a29bfe'];
    let confettiPieces = [];

    function spawnConfetti(){
      for(let i = 0; i < 2; i++){
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -10,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * 360,
          spin: Math.random() * 0.2 - 0.1
        });
      }
    }
    function drawConfetti(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
      });
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
      requestAnimationFrame(drawConfetti);
    }
    setInterval(spawnConfetti, 100);
    drawConfetti();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function spawnFloatingHeart(){
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }
    setInterval(spawnFloatingHeart, 600);

    function spawnFloatingStar(){
      const star = document.createElement('div');
      star.className = 'floating-star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      star.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 10000);
    }
    setInterval(spawnFloatingStar, 700);
  </script>
</body>
</html>
